<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogs in Foster Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        :root {
            --acct-blue: #004a99;
            --acct-orange: #f26522;
        }
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Open Sans', sans-serif;
        }
        .full-screen-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
            transition: opacity 1s ease-in-out;
        }
        .photo-section {
            flex: 1.2;
            height: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: opacity 1s ease-in-out;
        }
        .photo-section::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 150px;
            background: linear-gradient(to right, transparent, rgba(0,0,0,0.8));
        }
        .info-section {
            flex: 0.8;
            background-color: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            z-index: 10;
        }
        #dog-name {
            font-family: 'Playfair Display', serif;
            font-size: 7rem;
            font-weight: 800;
            font-style: italic;
            margin-bottom: 1.5rem;
            line-height: 1.0;
            color: var(--acct-orange);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        .dog-details {
            font-size: 2.5rem;
            margin-bottom: 2rem;
        }
        .dog-details b {
            color: #aaa;
            font-weight: 400;
            text-transform: uppercase;
            font-size: 1.5rem;
            display: block;
        }
        .header-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem 4rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 20;
        }
        .header-bar h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .footer-logo {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            width: 300px;
            z-index: 20;
        }
        .footer-logo img {
            width: 100%;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>

<div class="header-bar">
    <h2>Dogs in Foster Care as of <span id="date">...</span></h2>
</div>

<div class="full-screen-container">
    <div id="image-display" class="photo-section"></div>
    <div class="info-section">
        <h1 id="dog-name"></h1>
        <div class="dog-details">
            <b>ID Number</b>
            <span id="dog-id"></span>
        </div>
        <div class="dog-details">
            <b>Current Status/Location</b>
            <span id="dog-location"></span>
        </div>
    </div>
</div>

<div class="footer-logo">
    <img src="ACCT_Logo_White_PNG_new.png" alt="ACCT Philly Logo">
</div>

<script>
    window.SLIDESHOW_CONFIG = {
        apiUrl: 'https://new.shelterluv.com/api/v3/available-animals/13458?saved_query=1874&embedded=1&iframeId=shelterluv_wrap_1757291549&columns=1',
        pageTitle: 'Dogs in Foster Care'
    };
</script>
<script src="slideshow.js"></script>
</body>
</html>
